<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | FCV Admin</title>

<link rel="stylesheet" href="gallery.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo-section">

<img src="../logo.png">

<h2>FCV Admin</h2>

</div>

<ul>

<li onclick="window.location.href='admin-dashboard.html'">
<i class="fa-solid fa-house"></i>
<span>Dashboard</span>
</li>

<li onclick="window.location.href='engineers.html'">
<i class="fa-solid fa-users"></i>
<span>Engineers</span>
</li>

<li onclick="window.location.href='attendance.html'">
<i class="fa-solid fa-calendar-check"></i>
<span>Attendance</span>
</li>

<li class="active">
<i class="fa-solid fa-image"></i>
<span>Gallery</span>
</li>

<li onclick="window.location.href='reports.html'">
<i class="fa-solid fa-chart-line"></i>
<span>Reports</span>
</li>

<li onclick="window.location.href='settings.html'">
<i class="fa-solid fa-gear"></i>
<span>Settings</span>
</li>

<li onclick="logoutAdmin()">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</li>

</ul>

</div>

<div class="main-content">

<div class="topbar">

<h1>Selfie Gallery</h1>

<div class="admin-profile">

<i class="fa-solid fa-circle-user"></i>

<span>Admin</span>

</div>

</div>

<div class="search-box">

<input
type="text"
id="searchGallery"
placeholder="Search Engineer...">

</div>

<div class="gallery-grid" id="galleryGrid">
            <!-- Gallery Cards -->

        <div class="gallery-card">

            <img src="../images/no-image.png"
                 id="selfieImage"
                 alt="Selfie">

            <div class="gallery-info">

                <h3 id="engineerName">
                    Engineer Name
                </h3>

                <p id="captureDate">
                    Date : --
                </p>

                <p id="captureTime">
                    Time : --
                </p>

                <button class="location-btn"
                        onclick="viewLocation()">

                    <i class="fa-solid fa-location-dot"></i>

                    View Location

                </button>

            </div>

        </div>

    </div>

    <!-- Footer -->

    <div class="footer">

        © 2026 FCV Service Master | Gallery

    </div>

</div>

<script src="gallery.js"></script>

</body>

</html>
