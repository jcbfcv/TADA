<body>


<div class="sidebar">


<div class="logo-section">

<img src="../logo.png">

<h2>FCV Admin</h2>

</div>



<ul>

<i class="fa-solid fa-house"></i>

<li onclick="window.location.href='gallery.html'">

<i class="fa-solid fa-image"></i>

<li onclick="window.location.href='reports.html'">

<i class="fa-solid fa-chart-line"></i>

<li class="active">

<div class="admin-profile">

<i class="fa-solid fa-circle-user"></i>

<span>Admin</span>

</div>


</div>





<div class="settings-container">



<div class="setting-card">


<i class="fa-solid fa-user"></i>

<h2>Admin Profile</h2>


<label>
Admin Name
</label>

<input type="text" id="adminName"
value="Admin">



<label>
Mobile Number
</label>

<input type="text"
value="XXXXXXXXXX"
disabled>



<button onclick="saveProfile()">
Save Profile
</button>


</div>






<div class="setting-card">


<i class="fa-solid fa-lock"></i>

<h2>Change Password</h2>


<label>
Old Password
</label>

<input type="password"
id="oldPassword">



<label>
New Password
</label>

<input type="password"
id="newPassword">



<button onclick="changePassword()">
Update Password
</button>


</div>






<div class="setting-card">


<i class="fa-solid fa-circle-info"></i>

</p>
