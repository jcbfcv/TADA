<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engineer Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ebe9e9,#fefefe,#b7babc);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#fff;
border-radius:20px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:auto;
    display:block;
}

h2{
text-align:center;
margin-bottom:8px;
color:#1e293b;
}

.subtitle{
text-align:center;
font-size:14px;
color:#64748b;
margin-bottom:25px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#334155;
}

.input-box{
width:100%;
height:52px;
border:1px solid #d1d5db;
border-radius:10px;
padding:0 15px;
font-size:16px;
outline:none;
transition:.3s;
}

.input-box:focus{
border-color:#ed3f3f;
box-shadow:0 0 8px rgba(37,99,235,.2);
}

button{
width:100%;
height:50px;
border:none;
border-radius:10px;
background:#cf1f1f;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:18px;
transition:.3s;
}

button:hover{
background:#820e0e;
}

#otpSection{
display:none;
margin-top:25px;
}

.success-msg{
font-size:14px;
text-align:center;
color:green;
margin-bottom:18px;
font-weight:500;
}

.otp-container{
display:flex;
justify-content:space-between;
gap:8px;
}

.otp-input{
width:48px;
height:55px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:22px;
text-align:center;
outline:none;
transition:.3s;
}

.otp-input:focus{
border-color:#eb2f2f;
box-shadow:0 0 8px rgba(37,99,235,.2);
}
@media(max-width:480px){

.login-box{
padding:25px;
}

.otp-input{
width:42px;
height:50px;
font-size:20px;
}

button{
height:48px;
font-size:15px;
}

}
button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
    <img src="logo.png"  alt="Frontier Logo">
</div>

<h2>Engineer Login</h2>

<p class="subtitle">
Login using your registered mobile number
</p>

<label>Mobile Number</label>

<input
type="tel"
id="mobile"
class="input-box"
placeholder="Enter 10 digit mobile number"
maxlength="10"
>

<button id="pinBtn" onclick="sendOTP()">
Enter PIN
</button>

<div id="otpSection">

<!--<p class="success-msg">
OTP sent to your mobile number.<br>
Please enter the 6-digit OTP.
</p>-->

<div class="otp-container">

<input class="otp-input" maxlength="1">
<input class="otp-input" maxlength="1">
<input class="otp-input" maxlength="1">
<input class="otp-input" maxlength="1">
<!--<input class="otp-input" maxlength="1">
<input class="otp-input" maxlength="1">-->

</div>

<button onclick="verifyOTP()">
Login
</button>

</div>

</div>

<script>
const otpInputs = document.querySelectorAll(".otp-input");

otpInputs.forEach((input,index)=>{

input.addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

if(this.value.length===1 && index<otpInputs.length-1){
otpInputs[index+1].focus();
}

});

input.addEventListener("keydown",function(e){

if(e.key==="Backspace" && this.value==="" && index>0){
otpInputs[index-1].focus();
}

});

});

function sendOTP(){

let mobile=document.getElementById("mobile").value;

if(mobile.length!=10){

alert("Please enter a valid 10 digit mobile number.");

return;

}

document.getElementById("otpSection").style.display="block";
document.getElementById("pinBtn").disabled=true;

otpInputs[0].focus();

}

function verifyOTP(){

let otp="";

otpInputs.forEach(function(box){

otp+=box.value;

});

if(otp.length!=4){

alert("Please enter 4 digit PIN.");

return;

}

/*
Yahan baad me Google Apps Script ya Firebase se
OTP verify hoga.
*/

window.location.href="dashboard.html";

}
</script>

</body>
</html>
