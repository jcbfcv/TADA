<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Engineer Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Include Supabase JS CDN Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ebe9e9,#fefefe,#b7babc);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#fff;
border-radius:20px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:auto;
    display:block;
}

h2{
text-align:center;
margin-bottom:8px;
color:#1e293b;
}

.subtitle{
text-align:center;
font-size:14px;
color:#64748b;
margin-bottom:25px;
}

label{
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#334155;
}

.input-box{
width:100%;
height:52px;
border:1px solid #d1d5db;
border-radius:10px;
padding:0 15px;
font-size:16px;
outline:none;
transition:.3s;
}

.input-box:focus{
border-color:#ed3f3f;
box-shadow:0 0 8px rgba(37,99,235,.2);
}

button{
width:100%;
height:50px;
border:none;
border-radius:10px;
background:#cf1f1f;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:18px;
transition:.3s;
}

button:hover{
background:#820e0e;
}

#otpSection{
display:none;
margin-top:25px;
}

.otp-container{
display:flex;
justify-content:space-between;
gap:8px;
}

.otp-input{
width:48px;
height:55px;
border:1px solid #cbd5e1;
border-radius:10px;
font-size:22px;
text-align:center;
outline:none;
transition:.3s;
}

.otp-input:focus{
border-color:#eb2f2f;
box-shadow:0 0 8px rgba(37,99,235,.2);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

@media(max-width:480px){
.login-box{
padding:25px;
}
.otp-input{
width:42px;
height:50px;
font-size:20px;
}
button{
height:48px;
font-size:15px;
}
}
</style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <img src="logo.png" alt="Frontier Logo">
    </div>

    <h2>Engineer Login</h2>
    <p class="subtitle">Login using your registered mobile number</p>

    <label>Mobile Number</label>
    <input type="tel" id="mobile" class="input-box" placeholder="Enter 10 digit mobile number" maxlength="10">

    <button id="pinBtn" onclick="checkMobile()">Enter PIN</button>

    <div id="otpSection">
        <label>Enter 4-Digit Security PIN</label>
        <div class="otp-container">
            <input class="otp-input" type="password" inputmode="numeric" maxlength="1">
            <input class="otp-input" type="password" inputmode="numeric" maxlength="1">
            <input class="otp-input" type="password" inputmode="numeric" maxlength="1">
            <input class="otp-input" type="password" inputmode="numeric" maxlength="1">
        </div>
        <button id="loginBtn" onclick="verifyPIN()">Login</button>
    </div>
</div>

<script>
// ==========================================
// SUPABASE INITIALIZATION
// ==========================================
const SUPABASE_URL = 'https://ludsxcigohoyriplccfm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1ZHN4Y2lnb2hveXJpcGxjY2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NDQ2OTgsImV4cCI6MjA5OTMyMDY5OH0.rCiu1XfIEXTnFptbMgFeaLIrXLqGUZZJN8yuhy4lGkE';

const { createClient } = window.supabase;
const supabaseClientInstance = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const otpInputs = document.querySelectorAll(".otp-input");
let verifiedEngineerData = null; 

// Auto-redirect disabled intentionally to let you open the login page directly

// Mobile field enter key submission wrapper
document.getElementById("mobile").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkMobile();
    }
});

// Auto-focus Shifting for PIN digits
otpInputs.forEach((input, index) => {
    input.addEventListener("input", function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });
    input.addEventListener("keydown", function(e) {
        if (e.key === "Backspace" && this.value === "" && index > 0) {
            otpInputs[index - 1].focus();
        }
        // Submits form smoothly on pressing Enter inside the final digits field
        if (e.key === "Enter" && index === otpInputs.length - 1) {
            verifyPIN();
        }
    });
});

// Step 1: Check if Mobile Number exists in engineer_profiles
async function checkMobile() {
    let mobile = document.getElementById("mobile").value.trim();

    if (mobile.length !== 10 || isNaN(mobile)) {
        alert("Please enter a valid 10 digit mobile number.");
        return;
    }

    document.getElementById("pinBtn").innerText = "Checking...";
    document.getElementById("pinBtn").disabled = true;

    // Database lookup to verify phone structure limits
    const { data, error } = await supabaseClientInstance
        .from('engineer_profiles')
        .select('id, engineer_name, mobile_number, pin, status')
        .eq('mobile_number', mobile)
        .eq('status', 'Active')
        .maybeSingle();

    if (error) {
        console.error("Database query failed:", error);
        alert("Server error. Please try again later.");
        resetPinButton();
        return;
    }

    if (!data) {
        alert("This mobile number is not registered or active in our records.");
        resetPinButton();
        return;
    }

    // Success: Mobile found -> Show PIN screen view elements
    verifiedEngineerData = data; 
    document.getElementById("otpSection").style.display = "block";
    document.getElementById("pinBtn").style.display = "none";
    otpInputs[0].focus();
}

// Reset button styling state
function resetPinButton() {
    document.getElementById("pinBtn").innerText = "Enter PIN";
    document.getElementById("pinBtn").disabled = false;
}

// Step 2: Verify the 4-digit security PIN
async function verifyPIN() {
    let pinInput = "";
    otpInputs.forEach(box => { pinInput += box.value; });

    if (pinInput.length !== 4) {
        alert("Please enter full 4 digit PIN.");
        return;
    }

    document.getElementById("loginBtn").innerText = "Logging in...";
    document.getElementById("loginBtn").disabled = true;

    if (verifiedEngineerData && verifiedEngineerData.pin === pinInput) {
        // Caching engineer identifier AND name values into browser memory engine
        localStorage.setItem("engineer_id", verifiedEngineerData.id);
        localStorage.setItem("engineer_name", verifiedEngineerData.engineer_name);
        localStorage.setItem("engineer_session_key", verifiedEngineerData.id);
        
        window.location.href = "dashboard.html";
    } else {
        alert("Invalid PIN. Please try again.");
        document.getElementById("loginBtn").innerText = "Login";
        document.getElementById("loginBtn").disabled = false;
        
        otpInputs.forEach(box => { box.value = ""; });
        otpInputs[0].focus();
    }
}
</script>
</body>
</html>
